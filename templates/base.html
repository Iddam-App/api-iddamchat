{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IddamChat{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{% static 'css/iddamchat.css' %}" rel="stylesheet">
    <script>
    // Apply saved theme immediately to prevent flash
    (function() {
        var theme = localStorage.getItem('iddam_theme') || 'light';
        if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
    </script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-iddam sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{% static 'img/logo_brown.png' %}" alt="COGWA">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <!-- Guest nav -->
                <ul class="navbar-nav gap-1 align-items-center" id="nav-guest">
                    <li class="nav-item">
                        <a class="nav-link" href="/login/">Iniciar Sesion</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn btn-gold btn-sm text-white px-3" href="/register/">Registrarse</a>
                    </li>
                    <li class="nav-item ms-2">
                        <button class="theme-toggle" id="theme-toggle-guest" title="Cambiar tema">
                            <i class="bi bi-moon-fill"></i>
                        </button>
                    </li>
                </ul>
                <!-- Logged-in nav (hidden by default) -->
                <ul class="navbar-nav gap-2 align-items-center" id="nav-user" style="display:none;">
                    <li class="nav-item">
                        <a class="nav-link" href="/hobbies/"><i class="bi bi-palette me-1"></i>Hobbies</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/profile/"><i class="bi bi-person me-1"></i>Mi Perfil</a>
                    </li>
                    <li class="nav-item">
                        <span class="nav-link fw-semibold text-gold" id="nav-username"></span>
                    </li>
                    <li class="nav-item">
                        <button class="theme-toggle" id="theme-toggle-user" title="Cambiar tema">
                            <i class="bi bi-moon-fill"></i>
                        </button>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-danger" href="#" onclick="logout(); return false;">
                            <i class="bi bi-box-arrow-right"></i> Salir
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer-iddam">
        <div class="container">
            <img src="{% static 'img/logo_white.png' %}" alt="COGWA"><br>
            <span>&copy; 2026 Iglesia de Dios, Una Asociacion Mundial &mdash; IddamChat</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // ─── Theme Toggle ───
    (function() {
        function applyTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
            // Update all toggle button icons
            document.querySelectorAll('.theme-toggle i').forEach(function(icon) {
                icon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
            });
            localStorage.setItem('iddam_theme', theme);
        }

        function toggleTheme() {
            var current = localStorage.getItem('iddam_theme') || 'light';
            applyTheme(current === 'dark' ? 'light' : 'dark');
        }

        // Apply saved theme
        var saved = localStorage.getItem('iddam_theme') || 'light';
        applyTheme(saved);

        // Bind click to all toggle buttons
        document.querySelectorAll('.theme-toggle').forEach(function(btn) {
            btn.addEventListener('click', toggleTheme);
        });
    })();
    </script>
    <script>
    // ─── Auth helpers (available on all pages) ───
    const API = '';
    function getToken() { return localStorage.getItem('access_token'); }
    function isLoggedIn() { return !!getToken(); }

    async function authFetch(url, opts = {}) {
        opts.headers = opts.headers || {};
        opts.headers['Authorization'] = 'Bearer ' + getToken();
        if (!(opts.body instanceof FormData)) {
            opts.headers['Content-Type'] = opts.headers['Content-Type'] || 'application/json';
        }
        let res = await fetch(API + url, opts);
        if (res.status === 401) {
            // Try refresh
            const refreshRes = await fetch(API + '/api/auth/token/refresh/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ refresh: localStorage.getItem('refresh_token') })
            });
            if (refreshRes.ok) {
                const data = await refreshRes.json();
                localStorage.setItem('access_token', data.access);
                if (data.refresh) localStorage.setItem('refresh_token', data.refresh);
                opts.headers['Authorization'] = 'Bearer ' + data.access;
                res = await fetch(API + url, opts);
            } else {
                logout();
                return res;
            }
        }
        return res;
    }

    function logout() {
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');
        localStorage.removeItem('user_data');
        window.location.href = '/login/';
    }

    // Update navbar based on auth state
    (async function updateNav() {
        if (isLoggedIn()) {
            document.getElementById('nav-guest').style.display = 'none';
            document.getElementById('nav-user').style.display = 'flex';
            let userData = localStorage.getItem('user_data');
            if (userData) {
                userData = JSON.parse(userData);
                document.getElementById('nav-username').textContent = userData.first_name || userData.username;
            } else {
                try {
                    const res = await authFetch('/api/auth/me/');
                    if (res.ok) {
                        const u = await res.json();
                        localStorage.setItem('user_data', JSON.stringify(u));
                        document.getElementById('nav-username').textContent = u.first_name || u.username;
                    }
                } catch(e) {}
            }
        }
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
