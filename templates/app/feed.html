{% extends "base.html" %}
{% load static %}

{% block title %}Feed — IddamChat{% endblock %}

{% block content %}
<div class="feed-container">
    <!-- Stories Bar (decorative in Phase 1: shows followed users' avatars) -->
    <div class="stories-bar" id="stories-bar"></div>

    <!-- Loading spinner -->
    <div class="feed-spinner" id="feed-spinner">
        <div class="spinner-border" role="status"></div>
        <p class="mt-2">Cargando publicaciones...</p>
    </div>

    <!-- Posts feed -->
    <div id="posts-feed"></div>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state" style="display:none;">
        <i class="bi bi-people"></i>
        <h5>Tu feed esta vacio</h5>
        <p>Sigue a personas para ver sus publicaciones aqui</p>
        <a href="/hobbies/" class="btn btn-gradient mt-2">
            <i class="bi bi-compass me-1"></i>Explorar
        </a>
    </div>

    <!-- Load more -->
    <div class="text-center py-3" id="load-more-container" style="display:none;">
        <button class="btn btn-outline-gold btn-sm" id="btn-load-more">Cargar mas</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;

document.addEventListener('DOMContentLoaded', () => {
    if (!isLoggedIn()) { window.location.href = '/login/'; return; }

    loadStories();
    loadFeed();
    document.getElementById('btn-load-more').addEventListener('click', loadFeed);
});

// ─── Stories Bar (Phase 1: decorative, shows followed users) ───
async function loadStories() {
    try {
        const res = await authFetch('/api/social/following/');
        if (!res.ok) return;
        const data = await res.json();
        const follows = data.results || data;
        const bar = document.getElementById('stories-bar');

        if (follows.length === 0) {
            bar.style.display = 'none';
            return;
        }

        follows.slice(0, 15).forEach(f => {
            const user = f.followed || f;
            const initial = (user.first_name || user.username || '?')[0].toUpperCase();
            const avatarInner = user.avatar
                ? `<img src="${user.avatar}" alt="">`
                : initial;
            const name = user.first_name || user.username || '';

            bar.insertAdjacentHTML('beforeend', `
                <a href="/profile/${user.id}/" class="story-item">
                    <div class="story-avatar-ring">
                        <div class="story-avatar">${avatarInner}</div>
                    </div>
                    <span class="story-name">${escapeHtml(name)}</span>
                </a>
            `);
        });
    } catch(e) {
        console.error(e);
    }
}

// ─── Load Feed ───
async function loadFeed() {
    const spinner = document.getElementById('feed-spinner');
    if (currentPage === 1) spinner.style.display = 'block';

    try {
        const res = await authFetch(`/api/posts/feed/?page=${currentPage}`);
        if (!res.ok) throw new Error('Failed');
        const data = await res.json();

        spinner.style.display = 'none';
        const feed = document.getElementById('posts-feed');
        const posts = data.results || data;

        if (posts.length === 0 && currentPage === 1) {
            document.getElementById('empty-state').style.display = 'block';
            return;
        }

        posts.forEach(post => {
            feed.insertAdjacentHTML('beforeend', renderPostCard(post, { showType: true }));
        });

        if (data.next) {
            currentPage++;
            document.getElementById('load-more-container').style.display = 'block';
        } else {
            document.getElementById('load-more-container').style.display = 'none';
        }
    } catch(e) {
        spinner.style.display = 'none';
        console.error(e);
    }
}
</script>
{% endblock %}
