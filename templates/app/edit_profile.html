{% extends "base.html" %}
{% load static %}

{% block title %}Editar Perfil — IddamChat{% endblock %}

{% block content %}
<div class="edit-profile-container">
    <h3><i class="bi bi-pencil-square me-2"></i>Editar Perfil</h3>

    <!-- Avatar -->
    <div class="edit-avatar-wrapper">
        <div class="edit-avatar" id="edit-avatar" onclick="document.getElementById('avatar-input').click()">
            <span id="avatar-initial">?</span>
            <div class="edit-avatar-overlay"><i class="bi bi-camera"></i></div>
        </div>
        <input type="file" id="avatar-input" accept="image/*" style="display:none;">
        <small style="color:var(--text-light); margin-top:0.5rem;">Click para cambiar foto</small>
    </div>

    <!-- Profile Form -->
    <div class="edit-form-card">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" id="edit-first-name">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Apellido</label>
                <input type="text" class="form-control" id="edit-last-name">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Apodo</label>
            <input type="text" class="form-control" id="edit-nickname" placeholder="Opcional">
        </div>
        <div class="mb-3">
            <label class="form-label">Bio</label>
            <textarea class="form-control" id="edit-bio" maxlength="500" placeholder="Cuentanos sobre ti..."></textarea>
            <div class="bio-counter"><span id="bio-count">0</span>/500</div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Ciudad</label>
                <input type="text" class="form-control" id="edit-city" placeholder="Tu ciudad">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Pais</label>
                <input type="text" class="form-control" id="edit-country" list="country-list" placeholder="Tu pais">
                <datalist id="country-list">
                    <option value="Argentina">
                    <option value="Bolivia">
                    <option value="Brasil">
                    <option value="Chile">
                    <option value="Colombia">
                    <option value="Costa Rica">
                    <option value="Ecuador">
                    <option value="El Salvador">
                    <option value="Guatemala">
                    <option value="Honduras">
                    <option value="Mexico">
                    <option value="Nicaragua">
                    <option value="Panama">
                    <option value="Paraguay">
                    <option value="Peru">
                    <option value="Rep. Dominicana">
                    <option value="Uruguay">
                    <option value="Venezuela">
                    <option value="Estados Unidos">
                    <option value="España">
                </datalist>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Congregacion</label>
            <input type="text" class="form-control" id="edit-congregation" placeholder="Tu congregacion">
        </div>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">Instagram</label>
                <input type="text" class="form-control" id="edit-instagram" placeholder="@usuario">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Telefono</label>
                <input type="text" class="form-control" id="edit-phone" placeholder="+56 9...">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Edad</label>
                <input type="number" class="form-control" id="edit-age" min="1" max="120">
            </div>
        </div>

        <button class="btn btn-gradient w-100" id="btn-save" onclick="saveProfile()">
            <i class="bi bi-check-lg me-1"></i>Guardar Cambios
        </button>
    </div>

    <!-- Change Password -->
    <div class="edit-form-card">
        <div class="password-section" style="border:none; padding:0; margin:0;">
            <button class="password-toggle" onclick="togglePasswordSection()">
                <i class="bi bi-lock me-1"></i>Cambiar Contraseña
                <i class="bi bi-chevron-down" id="pw-chevron"></i>
            </button>
            <div id="password-fields" style="display:none; margin-top:1rem;">
                <div class="mb-3">
                    <label class="form-label">Contraseña Actual</label>
                    <input type="password" class="form-control" id="pw-current">
                </div>
                <div class="mb-3">
                    <label class="form-label">Nueva Contraseña</label>
                    <input type="password" class="form-control" id="pw-new">
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirmar Nueva Contraseña</label>
                    <input type="password" class="form-control" id="pw-confirm">
                </div>
                <button class="btn btn-outline-gold w-100" onclick="changePassword()">
                    Cambiar Contraseña
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let avatarFile = null;

document.addEventListener('DOMContentLoaded', () => {
    if (!isLoggedIn()) { window.location.href = '/login/'; return; }
    loadCurrentProfile();

    document.getElementById('edit-bio').addEventListener('input', function() {
        document.getElementById('bio-count').textContent = this.value.length;
    });

    document.getElementById('avatar-input').addEventListener('change', function() {
        if (this.files && this.files[0]) {
            avatarFile = this.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const el = document.getElementById('edit-avatar');
                el.innerHTML = `<img src="${e.target.result}" alt=""><div class="edit-avatar-overlay"><i class="bi bi-camera"></i></div>`;
            };
            reader.readAsDataURL(this.files[0]);
        }
    });
});

async function loadCurrentProfile() {
    try {
        const res = await authFetch('/api/auth/me/');
        if (!res.ok) return;
        const user = await res.json();

        // Avatar
        const avatarEl = document.getElementById('edit-avatar');
        if (user.avatar) {
            avatarEl.innerHTML = `<img src="${user.avatar}" alt=""><div class="edit-avatar-overlay"><i class="bi bi-camera"></i></div>`;
        } else {
            document.getElementById('avatar-initial').textContent = (user.first_name || user.username || '?')[0].toUpperCase();
        }

        // Fill fields
        document.getElementById('edit-first-name').value = user.first_name || '';
        document.getElementById('edit-last-name').value = user.last_name || '';
        document.getElementById('edit-nickname').value = user.nickname || '';
        document.getElementById('edit-bio').value = user.bio || '';
        document.getElementById('bio-count').textContent = (user.bio || '').length;
        document.getElementById('edit-city').value = user.city || '';
        document.getElementById('edit-country').value = user.country || '';
        document.getElementById('edit-congregation').value = user.congregation || '';
        document.getElementById('edit-instagram').value = user.instagram || '';
        document.getElementById('edit-phone').value = user.phone || '';
        document.getElementById('edit-age').value = user.age || '';
    } catch(e) {
        console.error(e);
    }
}

async function saveProfile() {
    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.textContent = 'Guardando...';

    const formData = new FormData();
    formData.append('first_name', document.getElementById('edit-first-name').value.trim());
    formData.append('last_name', document.getElementById('edit-last-name').value.trim());
    formData.append('nickname', document.getElementById('edit-nickname').value.trim());
    formData.append('bio', document.getElementById('edit-bio').value.trim());
    formData.append('city', document.getElementById('edit-city').value.trim());
    formData.append('country', document.getElementById('edit-country').value.trim());
    formData.append('congregation', document.getElementById('edit-congregation').value.trim());
    formData.append('instagram', document.getElementById('edit-instagram').value.trim());
    formData.append('phone', document.getElementById('edit-phone').value.trim());

    const age = document.getElementById('edit-age').value;
    if (age) formData.append('age', age);

    if (avatarFile) {
        formData.append('avatar', avatarFile);
    }

    try {
        const res = await authFetch('/api/auth/me/', {
            method: 'PUT',
            body: formData,
            headers: { 'Authorization': 'Bearer ' + getToken() }
        });

        if (res.ok) {
            const user = await res.json();
            localStorage.setItem('user_data', JSON.stringify(user));
            showToast('Perfil actualizado');
            avatarFile = null;
        } else {
            const data = await res.json();
            const msg = Object.values(data).flat().join(' ') || 'Error al guardar';
            showToast(msg);
        }
    } catch(e) {
        showToast('Error de conexion');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-check-lg me-1"></i>Guardar Cambios';
    }
}

function togglePasswordSection() {
    const fields = document.getElementById('password-fields');
    const chevron = document.getElementById('pw-chevron');
    if (fields.style.display === 'none') {
        fields.style.display = 'block';
        chevron.className = 'bi bi-chevron-up';
    } else {
        fields.style.display = 'none';
        chevron.className = 'bi bi-chevron-down';
    }
}

async function changePassword() {
    const current = document.getElementById('pw-current').value;
    const newPw = document.getElementById('pw-new').value;
    const confirm = document.getElementById('pw-confirm').value;

    if (!current || !newPw || !confirm) {
        showToast('Completa todos los campos');
        return;
    }
    if (newPw !== confirm) {
        showToast('Las contraseñas no coinciden');
        return;
    }
    if (newPw.length < 8) {
        showToast('Minimo 8 caracteres');
        return;
    }

    try {
        const res = await authFetch('/api/auth/me/password/', {
            method: 'POST',
            body: JSON.stringify({
                current_password: current,
                new_password: newPw
            })
        });

        if (res.ok) {
            showToast('Contraseña cambiada');
            document.getElementById('pw-current').value = '';
            document.getElementById('pw-new').value = '';
            document.getElementById('pw-confirm').value = '';
            togglePasswordSection();
        } else {
            const data = await res.json();
            showToast(data.detail || 'Error al cambiar contraseña');
        }
    } catch(e) {
        showToast('Error de conexion');
    }
}
</script>
{% endblock %}
